<!doctype html>
<html lang="it" data-theme="night">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#05080f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Percorsi lavoro" />
    <title>Percorsi lavoro</title>
    <link rel="manifest" href="/manifest.webmanifest?v=20260611-842" />
    <link rel="apple-touch-icon" href="/icons/icon-180.svg" />
    <link rel="icon" href="/icons/icon-192.svg" />
    <link rel="stylesheet" href="/styles.css?v=20260611-842" />
    <!-- Applica il tema salvato PRIMA del render per evitare il flash -->
    <script>
    (function(){try{
      var d=localStorage.getItem('pl_theme');
      var dark=window.matchMedia('(prefers-color-scheme: dark)').matches;
      var mode='auto',palette='default';
      if(d){var t=JSON.parse(d);mode=t.mode||'auto';palette=t.palette||'default';}
      if(mode==='auto'?dark:mode==='dark'){
        var m={default:'night',neon:'nero',luxury:'luxury-notte',metallo:'metallo',pietra:'pietra',foresta:'foresta-notte',legno:'legno'};
        document.documentElement.dataset.theme=m[palette]||'night';
      }else{
        var m={default:'day',neon:'neon-giorno',luxury:'luxury-giorno',metallo:'metallo-giorno',pietra:'pietra-giorno',foresta:'foresta-giorno',legno:'legno-giorno'};
        document.documentElement.dataset.theme=m[palette]||'day';
      }
    }catch(e){}}());
    </script>
  </head>
  <body>
    <!-- Splash screen — visibile finché l'app non è pronta -->
    <div id="splash" aria-hidden="true">
      <div class="splash-blob splash-blob-1"></div>
      <div class="splash-blob splash-blob-2"></div>
      <div class="splash-blob splash-blob-3"></div>
      <div class="splash-content">
        <div class="splash-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
        </div>
        <div class="splash-wordmark">Percorsi lavoro</div>
        <div class="splash-bar-wrap">
          <div class="splash-bar-track">
            <div class="splash-bar-fill" id="splash-bar"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Sfondo decorativo -->
    <div class="bg" aria-hidden="true">
      <div class="bg-blob bg-blob-1"></div>
      <div class="bg-blob bg-blob-2"></div>
      <div class="bg-blob bg-blob-3"></div>
      <div class="bg-blob bg-blob-4"></div>
    </div>
    <div class="top-line" aria-hidden="true"></div>

    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Pianificazione giornaliera</p>
          <h1>Percorsi lavoro</h1>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="status" id="map-status">Locale</div>
          <button id="menu-btn" class="menu-btn" aria-label="Menu">&#9776;</button>
        </div>
      </header>

      <nav class="tabs" aria-label="Sezioni app">
        <button class="tab active" data-tab="route">
  <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
  <span class="tab-label">Percorso</span>
</button>
<button class="tab" data-tab="saved">
  <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
  <span class="tab-label">Salvati</span>
</button>
<button class="tab" data-tab="archive">
  <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
  <span class="tab-label">Archivio</span>
</button>
<button class="tab" data-tab="result">
  <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
  <span class="tab-label">Risultato</span>
</button>
      </nav>

      <main id="app" class="app"></main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="/app.js?v=20260611-842"></script>
  </body>
</html>
